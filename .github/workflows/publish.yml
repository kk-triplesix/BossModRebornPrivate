name: Build & Release
on:
  push:
    tags:
      - '*.*.*.*'

env:
  CI: true

jobs:
  Build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get Tag Version
        run: |
          $tag = "${{ github.ref }}" -replace 'refs/tags/', ''
          "tag=$tag" | Out-File -Append -FilePath $Env:GITHUB_ENV

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore NuGet Packages
        run: dotnet restore BossMod\BossModReborn.csproj

      - name: Build Plugin
        run: |
          dotnet build --no-restore -c Release BossMod\BossModReborn.csproj `
            -p:AssemblyVersion=${{ env.tag }} `
            -p:FileVersion=${{ env.tag }} `
            -p:InformationalVersion=${{ env.tag }}

      - name: Find and zip release artifacts
        run: |
          # Find the actual output directory containing BossModReborn.dll
          $dll = Get-ChildItem -Recurse -Filter "BossModReborn.dll" -Path BossMod | Select-Object -First 1
          if (-not $dll) { throw "BossModReborn.dll not found" }
          $outDir = $dll.DirectoryName
          Write-Host "Found output at: $outDir"
          $names = @("BossModReborn.dll","BossModReborn.pdb","BossModReborn.json",
                     "DefaultRotationPresets.json","PInvoke.User32.dll",
                     "FFXIVClientStructs.dll")
          $existing = $names | ForEach-Object { Join-Path $outDir $_ } | Where-Object { Test-Path $_ }
          Write-Host "Zipping: $($existing -join ', ')"
          Compress-Archive -Path $existing -DestinationPath .\latest.zip -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./latest.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Plugin Repo Update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLUGIN_REPO_TOKEN }}
          repository: kk-triplesix/DalamudPlugins
          event-type: plugin-updated
          client-payload: '{"plugin": "BossModReborn", "version": "${{ env.tag }}"}'
